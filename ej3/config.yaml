model:
  type: "mlp"
  architecture: [784, 256, 128, 10]
  hidden_activation: "tanh"
  output_activation: "logistic"
  beta: 1.0
  initializer: "random_normal"
  init_scale: 0.05

training:
  optimizer: "adam"
  learning_rate: 0.0005
  batch_size: 64
  shuffle: true
  epochs: 300
  loss: "mse"
  momentum: 0.9
  adam_betas: [0.9, 0.999]
  adam_eps: 1.0e-8
  weight_decay: 1.0e-5
  early_stopping:
    enabled: true
    patience: 30

data:
  train_path: "data/more_digits.csv"
  test_path: "../ej2/data/digits_test.csv"
  preprocess:
    feature_scaler: "z-score"
    label_scaler: "none"
  split:
    val_frac: 0.2
    stratify: true
    seed: 42

experiment:
  name: "ej3_baseline"
  seed: 42
  save_plots: true
  log_every: 5
  save_model: true
